name: CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  BUILD_TYPE: Release

jobs:
  # Linux平台构建和测试
  build-linux:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        cc: [gcc, clang]
        
    name: Build and Test on Linux (${{ matrix.cc }})
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential ${{ matrix.cc }}
        
    - name: Configure CMake
      run: |
        export CC=${{ matrix.cc }}
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DBUILD_TESTS=ON \
          -DBUILD_EXAMPLES=ON
          
    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j$(nproc)
      
    - name: Run Unit Tests
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure -C ${{env.BUILD_TYPE}}
      
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-linux-${{ matrix.cc }}
        path: |
          ${{github.workspace}}/build/lib*
          ${{github.workspace}}/build/examples/*
          ${{github.workspace}}/build/tests/test_*

  # 代码质量检查
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck clang-format
        
    - name: Run cppcheck
      run: |
        cppcheck --enable=all --error-exitcode=1 \
          --suppress=missingInclude \
          --suppress=unusedFunction \
          --suppress=unmatchedSuppression \
          src/ 2>&1 | tee cppcheck-report.txt || true
          
    - name: Check code formatting
      run: |
        find src -name "*.c" -o -name "*.h" | \
          xargs clang-format --dry-run --Werror || true
          
    - name: Upload analysis results
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-report
        path: cppcheck-report.txt

  # 测试覆盖率
  coverage:
    runs-on: ubuntu-latest
    name: Test Coverage
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential gcovr
        
    - name: Configure with coverage
      run: |
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_TESTS=ON \
          -DCMAKE_C_FLAGS="--coverage" \
          -DCMAKE_CXX_FLAGS="--coverage"
          
    - name: Build
      run: cmake --build ${{github.workspace}}/build -j$(nproc)
      
    - name: Run tests
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure
      
    - name: Generate coverage report
      run: |
        gcovr --root . --html --html-details \
          -o coverage-report.html \
          --exclude tests/ \
          --exclude build/CMakeFiles/
          
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report.html
        
  # 文档构建
  build-docs:
    runs-on: ubuntu-latest
    name: Build Documentation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz
        
    - name: Check documentation
      run: |
        if [ -f Doxyfile ]; then
          doxygen Doxyfile 2>&1 | tee doxygen.log || true
        else
          echo "No Doxyfile found, skipping documentation build"
        fi
        
    - name: Upload documentation
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/html/
        
  # 配置工具构建
  build-config-tool:
    runs-on: ubuntu-latest
    name: Build Config Tool
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build DDS Config Tool
      working-directory: ${{github.workspace}}/dds-config-tool
      run: |
        make clean || true
        make all
        
    - name: Test Config Tool
      working-directory: ${{github.workspace}}/dds-config-tool
      run: |
        ./dds_config_cli --help || true
        
    - name: Upload config tool
      uses: actions/upload-artifact@v4
      with:
        name: dds-config-tool
        path: dds-config-tool/dds_config_cli

  # 港式平台交叉编译（模拟）
  cross-compile-arm:
    runs-on: ubuntu-latest
    name: Cross Compile for ARM
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install ARM toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi cmake
        
    - name: Create toolchain file
      run: |
        cat > arm-toolchain.cmake << 'EOF'
        set(CMAKE_SYSTEM_NAME Generic)
        set(CMAKE_SYSTEM_PROCESSOR arm)
        set(CMAKE_C_COMPILER arm-none-eabi-gcc)
        set(CMAKE_CXX_COMPILER arm-none-eabi-g++)
        set(CMAKE_C_FLAGS "-mcpu=cortex-m4 -mthumb" CACHE STRING "" FORCE)
        set(CMAKE_CXX_FLAGS "-mcpu=cortex-m4 -mthumb" CACHE STRING "" FORCE)
        set(CMAKE_EXE_LINKER_FLAGS "-specs=nosys.specs" CACHE STRING "" FORCE)
        EOF
        
    - name: Configure for ARM
      run: |
        cmake -B build-arm \
          -DCMAKE_TOOLCHAIN_FILE=arm-toolchain.cmake \
          -DBUILD_TESTS=OFF \
          -DBUILD_EXAMPLES=OFF || echo "Cross-compilation may have issues due to missing headers"
          
    - name: Try to build for ARM
      continue-on-error: true
      run: |
        cmake --build build-arm -j$(nproc) 2>&1 || echo "Cross-compilation requires platform-specific headers"
