# DDS Configuration File - Comprehensive Example
# 
# This file demonstrates all features of the DDS configuration tool.
# It includes multiple domains, QoS profiles, topics, and participants.
#
# SPDX-License-Identifier: MIT

version: "1.0.0"

# System Information
system:
  name: "IndustrialAutomationSystem"
  description: "DDS configuration for industrial automation with multiple domains"
  version: "2.1.0"

# Domain Configurations
domains:
  - id: 0
    name: "ControlDomain"
    description: "Real-time control domain for critical operations"
    discovery:
      enabled: true
      protocol: UDPv4
      lease_duration: "30s"
      liveliness_check_interval: "5s"
    transport:
      multicast_enabled: true
      multicast_address: "239.255.0.1"
    security:
      enabled: false

  - id: 1
    name: "MonitoringDomain"
    description: "Domain for system monitoring and diagnostics"
    discovery:
      enabled: true
      protocol: UDPv4
      lease_duration: "60s"
      liveliness_check_interval: "10s"
    transport:
      multicast_enabled: false
    security:
      enabled: false

  - id: 10
    name: "SecureDomain"
    description: "Secure domain with authentication and encryption"
    discovery:
      enabled: true
      protocol: UDPv4
      lease_duration: "30s"
    transport:
      multicast_enabled: false
    security:
      enabled: true
      auth_kind: "PKI_DH"
      identity_ca: "/etc/dds/security/identity_ca.pem"
      identity_certificate: "/etc/dds/security/identity_cert.pem"
      private_key: "/etc/dds/security/private_key.pem"
      permissions_ca: "/etc/dds/security/permissions_ca.pem"
      permissions: "/etc/dds/security/permissions.xml"
      governance: "/etc/dds/security/governance.xml"

# QoS Profiles
qos_profiles:
  # Default profile for general communication
  - name: "default_qos"
    description: "Default QoS profile with best-effort reliability"
    reliability:
      kind: BEST_EFFORT
    durability:
      kind: VOLATILE
    history:
      kind: KEEP_LAST
      depth: 1
    resource_limits:
      max_samples: 100
      max_instances: 10
      max_samples_per_instance: 10

  # Reliable profile for critical data
  - name: "reliable_qos"
    description: "Reliable QoS for critical command and control"
    reliability:
      kind: RELIABLE
      max_blocking_time: "100ms"
    durability:
      kind: TRANSIENT_LOCAL
    history:
      kind: KEEP_LAST
      depth: 10
    deadline:
      period: "100ms"
    latency_budget:
      duration: "10ms"
    resource_limits:
      max_samples: 1000
      max_instances: 100
      max_samples_per_instance: 10
    liveliness:
      kind: AUTOMATIC
      lease_duration: "10s"

  # Sensor data profile
  - name: "sensor_qos"
    description: "Optimized for high-frequency sensor data"
    reliability:
      kind: BEST_EFFORT
    durability:
      kind: VOLATILE
    history:
      kind: KEEP_LAST
      depth: 1
    transport_priority:
      value: 5
    lifespan:
      duration: "500ms"

  # Persistent profile for configuration data
  - name: "persistent_qos"
    description: "Persistent QoS for configuration and state data"
    base_profile: "reliable_qos"
    reliability:
      kind: RELIABLE
      max_blocking_time: "1s"
    durability:
      kind: TRANSIENT
    history:
      kind: KEEP_ALL
    resource_limits:
      max_samples: 10000
      max_instances: 100
      max_samples_per_instance: 100

  # Exclusive ownership profile
  - name: "ownership_qos"
    description: "Exclusive ownership for redundant publishers"
    reliability:
      kind: RELIABLE
    ownership:
      kind: EXCLUSIVE
    ownership_strength:
      value: 100

# Topic Definitions
topics:
  # Control topics
  - name: "RobotCommand"
    type: "RobotCommandType"
    domain_id: 0
    qos_profile: "reliable_qos"
    partitions:
      - "control"
    content_filter: ""

  - name: "RobotStatus"
    type: "RobotStatusType"
    domain_id: 0
    qos_profile: "reliable_qos"
    partitions:
      - "control"
      - "status"

  # Sensor topics
  - name: "TemperatureSensor"
    type: "TemperatureType"
    domain_id: 1
    qos_profile: "sensor_qos"
    time_based_filter: "100ms"

  - name: "PressureSensor"
    type: "PressureType"
    domain_id: 1
    qos_profile: "sensor_qos"
    time_based_filter: "50ms"

  - name: "VibrationSensor"
    type: "VibrationType"
    domain_id: 1
    qos_profile: "sensor_qos"

  # Configuration topics
  - name: "SystemConfig"
    type: "ConfigType"
    domain_id: 0
    qos_profile: "persistent_qos"
    partitions:
      - "config"

  - name: "AlarmEvent"
    type: "AlarmType"
    domain_id: 0
    qos_profile: "reliable_qos"
    partitions:
      - "alarms"

  # Secure topics
  - name: "SecureCommand"
    type: "SecureCommandType"
    domain_id: 10
    qos_profile: "reliable_qos"
    partitions:
      - "secure"

# Participant Definitions
participants:
  - name: "RobotController"
    domain_id: 0
    qos_profile: "default_qos"
    entity_factory:
      autoenable_created_entities: true

  - name: "SensorAggregator"
    domain_id: 1
    qos_profile: "default_qos"

  - name: "MonitoringStation"
    domain_id: 1
    qos_profile: "default_qos"

  - name: "ConfigManager"
    domain_id: 0
    qos_profile: "persistent_qos"

  - name: "SecureGateway"
    domain_id: 10
    qos_profile: "reliable_qos"

# Logging Configuration
logging:
  enabled: true
  level: INFO
  output: stdout
  log_file: "/var/log/dds/system.log"
  categories:
    - name: "DISCOVERY"
      level: INFO
    - name: "TRANSPORT"
      level: WARN
    - name: "SECURITY"
      level: DEBUG

# Monitoring Configuration
monitoring:
  enabled: true
  statistics_enabled: true
  statistics_interval: "30s"
  # Metrics to collect (bitmask)
  # 0x01 = Throughput
  # 0x02 = Latency
  # 0x04 = Discovery
  # 0x08 = Resource usage
  metrics: 0x0F
